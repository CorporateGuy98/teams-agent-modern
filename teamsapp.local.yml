# yaml-language-server: $schema=https://aka.ms/teams-toolkit/v1.7/yaml.schema.json
version: v1.7

provision:
  - uses: botAadApp/create
    with:
      name: helpdesk-bot-local
    writeToEnvironmentFile:
      botId: BOT_ID
      botPassword: SECRET_BOT_PASSWORD

  - uses: botFramework/create
    with:
      botId: ${{BOT_ID}}
      name: helpdesk-bot-local
      messagingEndpoint: ${{BOT_ENDPOINT}}/api/messages
      description: "IT Yardım Masası Botu (Local)"
      channels:
        - name: msteams

  - uses: teamsApp/create
    with:
      name: IT-Helpdesk-local
    writeToEnvironmentFile:
      teamsAppId: TEAMS_APP_ID

  - uses: teamsApp/validateManifest
    with:
      manifestPath: ./appPackage/manifest.json

  - uses: teamsApp/zipAppPackage
    with:
      manifestPath: ./appPackage/manifest.json
      outputZipPath: ./appPackage/build/appPackage.local.zip
      outputFolder: ./appPackage/build

  - uses: teamsApp/update
    with:
      appPackagePath: ./appPackage/build/appPackage.local.zip

deploy:
  - uses: cli/runNpmCommand
    with:
      args: install

  - uses: cli/runNpmCommand
    with:
      args: run build

  - uses: devTunnel/create
    with:
      type: persistent
      port: 3978
    writeToEnvironmentFile:
      endpoint: BOT_ENDPOINT

  - uses: file/createOrUpdateEnvironmentFile
    with:
      target: ./.env
      envs:
        MicrosoftAppId: ${{BOT_ID}}
        MicrosoftAppPassword: ${{SECRET_BOT_PASSWORD}}
        MicrosoftAppType: MultiTenant
